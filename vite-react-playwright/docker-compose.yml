version: '3.8'

services:
  # Single service combining Nginx frontend and Python backend
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kid-progress-dashboard
    ports:
      - "80:80"
      - "8000:8000"
    environment:
      - BACKEND_URL=https://kid-progress-dashboard.onrender.com
      - NODE_ENV=production
    volumes:
      # Persist the database
      - ./backend/progress.db:/app/backend/progress.db
      # Nginx logs
      - /var/log/nginx:/var/log/nginx
    networks:
      - dashboard-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

networks:
  dashboard-network:
    driver: bridge

volumes:
  app-data:
    driver: local
